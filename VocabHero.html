      --dusty-rose: #d4a0a0;
      --warm-gray: #8c7b75;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--cream);
      color: var(--espresso);
      min-height: 100vh;
    }

    h1, h2, h3, .font-display { font-family: 'Playfair Display', serif; }

    /* ── Header ── */
    .site-header {
      background: linear-gradient(135deg, #3d2b1f 0%, #6b3f2a 50%, #c4956a 100%);
      padding: 2rem 1rem 3rem;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='10'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ── Search bar ── */
    .search-wrap {
      position: relative;
      max-width: 500px;
      margin: 0 auto;
    }
    .search-input {
      width: 100%;
      padding: 0.75rem 3rem 0.75rem 1.2rem;
      border-radius: 50px;
      border: 2px solid rgba(196,149,106,0.4);
      background: rgba(255,255,255,0.95);
      font-size: 1rem;
      color: var(--espresso);
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .search-input:focus {
      border-color: var(--cappuccino);
      box-shadow: 0 0 0 3px rgba(196,149,106,0.2);
    }
    .search-icon {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--cappuccino); pointer-events: none; font-size: 1.1rem;
    }

    /* ── Category Tabs ── */
    .tabs-container {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 1rem;
      justify-content: center;
    }
    .tab-btn {
      padding: 0.45rem 1rem;
      border-radius: 50px;
      border: 2px solid transparent;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.25s;
      background: white;
      color: var(--warm-gray);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .tab-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
    .tab-btn.active {
      background: var(--cappuccino);
      color: white;
      border-color: var(--cappuccino);
      box-shadow: 0 3px 10px rgba(196,149,106,0.4);
    }

    /* ── Word Card ── */
    .word-card {
      background: white;
      border-radius: 16px;
      padding: 1.25rem 1.4rem;
      box-shadow: 0 2px 12px rgba(61,43,31,0.06);
      border-left: 5px solid var(--cappuccino);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .word-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 60px; height: 60px;
      border-radius: 0 16px 0 60px;
      opacity: 0.08;
    }
    .word-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(61,43,31,0.12);
    }

    /* ── Category-colour accents ── */
    .cat-truth      { border-color: #d4706a; } .cat-truth::before      { background:#d4706a; }
    .cat-wealth     { border-color: #c4a24a; } .cat-wealth::before     { background:#c4a24a; }
    .cat-diplomacy  { border-color: #6a9ec4; } .cat-diplomacy::before  { background:#6a9ec4; }
    .cat-conflict   { border-color: #c4706a; } .cat-conflict::before   { background:#c4706a; }
    .cat-character  { border-color: #8a6ac4; } .cat-character::before  { background:#8a6ac4; }
    .cat-mind       { border-color: #6ac4a4; } .cat-mind::before       { background:#6ac4a4; }
    .cat-speech     { border-color: #c46aa4; } .cat-speech::before     { background:#c46aa4; }
    .cat-society    { border-color: #6ac46a; } .cat-society::before    { background:#6ac46a; }
    .cat-emotion    { border-color: #c48a6a; } .cat-emotion::before    { background:#c48a6a; }
    .cat-knowledge  { border-color: #6a8ac4; } .cat-knowledge::before  { background:#6a8ac4; }
    .cat-misc       { border-color: #a4a4a4; } .cat-misc::before       { background:#a4a4a4; }

    /* ── Word tag colours per category ── */
    .badge-truth     { background:#fff0ef; color:#b5463f; }
    .badge-wealth    { background:#fffbe8; color:#8a6a10; }
    .badge-diplomacy { background:#eef4ff; color:#2a5a8a; }
    .badge-conflict  { background:#fff0ef; color:#a03020; }
    .badge-character { background:#f5f0ff; color:#5a3a9a; }
    .badge-mind      { background:#edfff8; color:#1a7a5a; }
    .badge-speech    { background:#fef0f8; color:#9a3a7a; }
    .badge-society   { background:#efffef; color:#2a7a2a; }
    .badge-emotion   { background:#fff5ef; color:#8a4020; }

    .antonym-pill {
      display: inline-block;
      padding: 0.15rem 0.65rem;
      border-radius: 50px;
      background: var(--latte);
      color: var(--espresso);
      font-size: 0.72rem;
      font-weight: 700;
      margin: 0.15rem 0.1rem 0;
    }

    /* ── Example sentence ── */
    .example-text {
      font-style: italic;
      font-size: 0.85rem;
      color: #7a6055;
      border-left: 3px solid var(--latte);
      padding-left: 0.75rem;
      margin-top: 0.5rem;

    .bangla-meaning {
      font-size: 0.8rem;
      color: var(--cappuccino);
      font-weight: 600;
    }

    /* ── Loading / error states ── */
    .loader {
      display: flex; align-items: center; justify-content: center;
      min-height: 40vh; flex-direction: column; gap: 1rem;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid var(--latte);
      border-top-color: var(--cappuccino);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      justify-content: center; padding: 0.75rem;
    }
    .stat-item { text-align: center; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--cappuccino); font-weight: 700; }
    .stat-label { font-size: 0.7rem; color: var(--warm-gray); text-transform: uppercase; letter-spacing: 0.08em; }

    .cat-header {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 1.5rem 0 0.75rem;

      font-size: 1.1rem; font-weight: 700;
      color: var(--espresso);

      padding: 0.12rem 0.5rem;
      border-radius: 50px;
      background: var(--espresso);
      color: var(--latte);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      vertical-align: middle;

    /* Scrollbar */

    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--latte); border-radius: 3px; }

    mark { background: #ffe08a; border-radius: 2px; padding: 0 2px; }

    /* No results */
    .no-results { text-align: center; padding: 3rem 1rem; color: var(--warm-gray); font-size: 1rem; }
  </style>
</head>

/* ══════════════════════════════════════════════════════
   CATEGORY MAPPING HELPERS
══════════════════════════════════════════════════════ */
function detectCategory(word, meaning) {
  const text = (word + ' ' + meaning).toLowerCase();
  for (const cat of CATEGORIES) {
    if (cat.id === 'misc') continue;
    for (const kw of cat.keywords) {
      if (text.includes(kw)) return cat.id;
    }
  }
  return 'misc';
}

function getCat(id) {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1];
}

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let allWords = [];
let filteredWords = [];
let activeCategory = 'all';
let searchQuery = '';

/* ══════════════════════════════════════════════════════
   FETCH & PARSE XLSX
══════════════════════════════════════════════════════ */
async function fetchAndParseXLSX() {
  const url = 'https://raw.githubusercontent.com/TR4842/Wordsmart-1/main/Word%20Smart%20DB.xlsx';
  try {
    const res = await fetch(url, { cache: 'force-cache' });
    if (!res.ok) throw new Error('Network error');
    const ab = await res.arrayBuffer();
    const wb = XLSX.read(ab, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

    if (!rows || rows.length === 0) throw new Error('Empty sheet');

    const parsed = [];
    const keys = Object.keys(rows[0]);

    // Try to auto-detect column names
    const colWord    = keys.find(k => /word|vocab|term/i.test(k)) || keys[0];
    const colPos     = keys.find(k => /pos|type|part\s*of/i.test(k)) || null;
    const colMeaning = keys.find(k => /mean|defin|english/i.test(k)) || keys[1] || null;
    const colBangla  = keys.find(k => /bangla|bn|বাংলা|bangla/i.test(k)) || null;
    const colExample = keys.find(k => /example|sentence|use/i.test(k)) || null;
    const colAntonym = keys.find(k => /antonym|opposite/i.test(k)) || null;
    const colCat     = keys.find(k => /categ|theme|group/i.test(k)) || null;

    for (const row of rows) {
      const word = String(row[colWord] || '').trim();
      if (!word || word.toLowerCase() === colWord.toLowerCase()) continue;
      const meaning = colMeaning ? String(row[colMeaning] || '').trim() : '';
      const bangla  = colBangla  ? String(row[colBangla]  || '').trim() : '';
      const example = colExample ? String(row[colExample] || '').trim() : '';
      const pos     = colPos     ? String(row[colPos]     || '').trim() : '';
      const antRaw  = colAntonym ? String(row[colAntonym] || '').trim() : '';
      const antonyms = antRaw ? antRaw.split(/[,;\/|]+/).map(s=>s.trim()).filter(Boolean).slice(0,2) : [];
      const catRaw  = colCat ? String(row[colCat] || '').trim().toLowerCase() : '';
      const category = catRaw || detectCategory(word, meaning);

      parsed.push({ word, pos, meaning, bangla, example, antonyms, category });
    }
    return parsed;
  } catch (e) {
    console.warn('Could not fetch/parse XLSX:', e.message);
    return [];
  }
}

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function highlight(text, q) {
  if (!q) return text;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function buildCard(w, q) {
  const cat = getCat(w.category);
  const hl = s => highlight(s, q);
  const antPills = (w.antonyms || []).map(a =>
    `<span class="antonym-pill">↔ ${hl(a)}</span>`).join('');

  return `
    <div class="word-card ${cat.cssClass}" data-cat="${w.category}">
      <div class="flex flex-wrap items-center gap-2 mb-1">
        <h3 class="font-display text-lg font-bold" style="color:var(--espresso)">${hl(w.word)}</h3>
        ${w.pos ? `<span class="pos-tag">${w.pos}</span>` : ''}
        <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${cat.badgeClass}">${cat.icon} ${cat.label.replace(/^.+ /,'')}</span>
      </div>
      ${w.meaning ? `<p class="text-sm font-semibold mb-0.5" style="color:#4a3728">${hl(w.meaning)}</p>` : ''}
      ${w.bangla  ? `<p class="bangla-meaning mb-1">🇧🇩 ${hl(w.bangla)}</p>` : ''}
      ${w.example ? `<p class="example-text">"${hl(w.example)}"</p>` : ''}
      ${antPills  ? `<div class="mt-1.5">${antPills}</div>` : ''}
    </div>`;
}

function renderWords() {
  const container = document.getElementById('cardsContainer');
  const q = searchQuery.toLowerCase().trim();

  // Filter
  filteredWords = allWords.filter(w => {
    const matchCat = activeCategory === 'all' || w.category === activeCategory;
    if (!matchCat) return false;
    if (!q) return true;
    return (
      w.word.toLowerCase().includes(q) ||
      w.meaning.toLowerCase().includes(q) ||
      w.bangla.toLowerCase().includes(q) ||
      (w.example || '').toLowerCase().includes(q) ||
      (w.antonyms || []).some(a => a.toLowerCase().includes(q))
    );
  });

  if (filteredWords.length === 0) {
    container.innerHTML = `<div class="no-results">
      <div style="font-size:2rem">🔍</div>
      <p class="mt-2 font-semibold">No words found</p>
      <p class="text-sm mt-1">Try a different search or category.</p>
    </div>`;
    return;
  }

  // Group by category
  const grouped = {};
  for (const w of filteredWords) {
    if (!grouped[w.category]) grouped[w.category] = [];
    grouped[w.category].push(w);
  }

  // Sort categories
  const catOrder = CATEGORIES.map(c => c.id);
  const sortedCats = Object.keys(grouped).sort((a,b) =>
    catOrder.indexOf(a) - catOrder.indexOf(b));

  let html = '';
  for (const catId of sortedCats) {
    const cat = getCat(catId);
    const words = grouped[catId];
    if (activeCategory !== 'all') {
      // No header needed for single category
    } else {
      html += `<div class="cat-header">
        <div class="cat-line"></div>
        <h2>${cat.icon} ${cat.label}</h2>
        <span class="text-xs px-2 py-0.5 rounded-full font-bold" style="background:${cat.color}22;color:${cat.color}">${words.length}</span>
        <div class="cat-line"></div>
      </div>`;
    }
    html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-2">`;
    for (const w of words) html += buildCard(w, searchQuery);
    html += `</div>`;
  }

  container.innerHTML = html;
}

function renderTabs() {
  const tabsContainer = document.getElementById('tabsContainer');
  const catCounts = {};
  for (const w of allWords) catCounts[w.category] = (catCounts[w.category] || 0) + 1;

  let html = `<button class="tab-btn ${activeCategory==='all'?'active':''}" data-cat="all">✦ All (${allWords.length})</button>`;
  for (const cat of CATEGORIES) {
    const count = catCounts[cat.id] || 0;
    if (count === 0) continue;
    html += `<button class="tab-btn ${activeCategory===cat.id?'active':''}" data-cat="${cat.id}" style="${activeCategory===cat.id?'':''}">
      ${cat.icon} ${cat.label.replace(/^.+ /,'')} (${count})
    </button>`;
  }
  tabsContainer.innerHTML = html;

  tabsContainer.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      tabsContainer.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderWords();
      window.scrollTo({ top: 180, behavior: 'smooth' });
    });
  });
}

function updateStats() {
  document.getElementById('totalWords').textContent = allWords.length;
  const catCounts = new Set(allWords.map(w => w.category)).size;
  document.getElementById('totalCats').textContent = catCounts;
  document.getElementById('loadStatus').textContent = '✓';
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
async function init() {
  // Start with built-in data
  allWords = [...BUILTIN_WORDS];

  // Attempt to load from GitHub
  const xlsxWords = await fetchAndParseXLSX();

  if (xlsxWords.length > 0) {
    // Merge: XLSX words take priority (no duplicates)
    const existingWords = new Set(BUILTIN_WORDS.map(w => w.word.toLowerCase()));
    const newFromXLSX = xlsxWords.filter(w => !existingWords.has(w.word.toLowerCase()));
    allWords = [...BUILTIN_WORDS, ...newFromXLSX];
  }

  // Show content
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('cardsContainer').classList.remove('hidden');

  updateStats();
  renderTabs();
  renderWords();
}

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderWords();
  if (searchQuery.trim()) {
    // Switch to all when searching
    activeCategory = 'all';
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === 'all');
    });
  }
});

// Kick off
init();
</script>
